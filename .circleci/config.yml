version: 2.1

workflows:
  cache-benchmark:
    jobs:
      - benchmark-no-cache
      - benchmark-warm-cache
      - benchmark-cold-miss

jobs:
  benchmark-no-cache:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: sudo apt-get update && sudo apt-get install -y libmemcached-dev
      - run:
          name: Install Django
          command: pip install --no-cache-dir -e .
      - run:
          name: Install test dependencies (no cache, no pip cache)
          command: pip install --no-cache-dir -r tests/requirements/py3.txt

  benchmark-warm-cache:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: sudo apt-get update && sudo apt-get install -y libmemcached-dev
      - restore_cache:
          keys:
            - django-deps-v1-{{ checksum "tests/requirements/py3.txt" }}
      - run:
          name: Install Django
          command: pip install -e .
      - run:
          name: Install test dependencies
          command: pip install -r tests/requirements/py3.txt
      - save_cache:
          key: django-deps-v1-{{ checksum "tests/requirements/py3.txt" }}
          paths:
            - ~/.cache/pip
            - ~/.local/lib/python3.12/site-packages

  benchmark-cold-miss:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: sudo apt-get update && sudo apt-get install -y libmemcached-dev
      - restore_cache:
          keys:
            # Intentionally wrong key — will always miss, measures failed restore overhead
            - django-deps-v1-cache-miss-{{ epoch }}
      - run:
          name: Install Django
          command: pip install --no-cache-dir -e .
      - run:
          name: Install test dependencies (after cache miss)
          command: pip install --no-cache-dir -r tests/requirements/py3.txt